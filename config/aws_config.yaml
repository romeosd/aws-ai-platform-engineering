# ============================================================
# AWS AI Platform Engineering — Configuration
# Author: Ramy Amer
# ============================================================
# Wire all AWS service endpoints, model IDs, and resource ARNs here.
# Never commit secrets — use AWS Secrets Manager or environment variables.

aws:
  region: ap-southeast-2
  account_id: "${AWS_ACCOUNT_ID}"          # export AWS_ACCOUNT_ID=123456789012
  profile: "${AWS_PROFILE:-default}"

# ------------------------------------------------------------
# Amazon Bedrock — Foundation Models
# ------------------------------------------------------------
bedrock:
  region: ap-southeast-2

  models:
    # Anthropic Claude
    claude_sonnet:    "anthropic.claude-3-5-sonnet-20241022-v2:0"
    claude_haiku:     "anthropic.claude-3-haiku-20240307-v1:0"
    claude_opus:      "anthropic.claude-3-opus-20240229-v1:0"

    # Amazon Titan
    titan_text:       "amazon.titan-text-premier-v1:0"
    titan_embed:      "amazon.titan-embed-text-v2:0"
    titan_multimodal: "amazon.titan-embed-image-v1"

    # Meta Llama
    llama3_70b:       "meta.llama3-70b-instruct-v1:0"
    llama3_8b:        "meta.llama3-8b-instruct-v1:0"

    # Mistral
    mistral_large:    "mistral.mistral-large-2402-v1:0"
    mistral_7b:       "mistral.mistral-7b-instruct-v0:2"

    # Cohere
    cohere_command:   "cohere.command-r-plus-v1:0"
    cohere_embed:     "cohere.embed-english-v3"

  inference:
    max_tokens: 4096
    temperature: 0.1
    top_p: 0.9
    timeout_seconds: 120
    retry_attempts: 3
    retry_delay_seconds: 2

  streaming:
    enabled: true
    chunk_size: 512

# ------------------------------------------------------------
# Bedrock Knowledge Bases — RAG
# ------------------------------------------------------------
bedrock_knowledge_bases:
  knowledge_base_id: "${BEDROCK_KB_ID}"
  data_source_id:    "${BEDROCK_DS_ID}"

  retrieval:
    max_results: 10
    search_type: "HYBRID"              # SEMANTIC | HYBRID | KEYWORD
    relevance_threshold: 0.7

  vector_store:
    type: "OPENSEARCH_SERVERLESS"      # OPENSEARCH_SERVERLESS | PINECONE | RDS
    collection_arn: "${OPENSEARCH_COLLECTION_ARN}"
    index_name: "aws-ai-platform-kb"
    embedding_model: "amazon.titan-embed-text-v2:0"
    dimensions: 1024

  chunking:
    strategy: "HIERARCHICAL"           # FIXED | HIERARCHICAL | SEMANTIC
    max_tokens: 300
    overlap_percentage: 20

# ------------------------------------------------------------
# Bedrock Agents
# ------------------------------------------------------------
bedrock_agents:
  agent_id:      "${BEDROCK_AGENT_ID}"
  agent_alias_id: "${BEDROCK_AGENT_ALIAS_ID}"

  foundation_model: "anthropic.claude-3-5-sonnet-20241022-v2:0"
  idle_session_ttl: 600

  action_groups:
    - name: "DataQueryActionGroup"
      lambda_arn: "${LAMBDA_DATA_QUERY_ARN}"
    - name: "DocumentProcessingActionGroup"
      lambda_arn: "${LAMBDA_DOC_PROCESSING_ARN}"
    - name: "NotificationActionGroup"
      lambda_arn: "${LAMBDA_NOTIFICATION_ARN}"

  memory:
    enabled: true
    storage_days: 30

# ------------------------------------------------------------
# Bedrock Guardrails
# ------------------------------------------------------------
bedrock_guardrails:
  guardrail_id:      "${BEDROCK_GUARDRAIL_ID}"
  guardrail_version: "DRAFT"

  content_filters:
    hate:       MEDIUM
    insults:    MEDIUM
    sexual:     HIGH
    violence:   HIGH
    misconduct: HIGH
    prompt_attack: HIGH

  pii_entities:
    - EMAIL
    - PHONE
    - SSN
    - CREDIT_DEBIT_CARD_NUMBER
    - AWS_ACCESS_KEY
    - IP_ADDRESS
    - NAME
    - ADDRESS

  denied_topics:
    - name: "CompetitorProducts"
      definition: "Any discussion of competing cloud providers' AI products"

  word_filters:
    - "confidential"
    - "internal use only"

  grounding_threshold: 0.75
  relevance_threshold: 0.75

# ------------------------------------------------------------
# Amazon SageMaker
# ------------------------------------------------------------
sagemaker:
  execution_role_arn: "${SAGEMAKER_EXECUTION_ROLE_ARN}"
  default_bucket: "${SAGEMAKER_DEFAULT_BUCKET}"

  training:
    instance_type: "ml.p3.2xlarge"
    instance_count: 1
    volume_size_gb: 50
    max_runtime_seconds: 86400

  endpoints:
    inference_instance: "ml.g4dn.xlarge"
    min_capacity: 1
    max_capacity: 5
    target_invocations_per_instance: 70

  pipelines:
    pipeline_name: "aws-ai-platform-pipeline"
    pipeline_description: "End-to-end ML pipeline for AWS AI Platform Engineering"

  clarify:
    bias_config:
      label_column: "target"
      facet_column: "sensitive_feature"
    explainability:
      method: "shap"
      num_samples: 100

  mlflow:
    tracking_uri: "${MLFLOW_TRACKING_URI}"
    experiment_name: "aws-ai-platform-experiments"

# ------------------------------------------------------------
# Amazon OpenSearch Serverless
# ------------------------------------------------------------
opensearch:
  endpoint: "${OPENSEARCH_ENDPOINT}"
  collection_name: "aws-ai-platform-vectors"
  index_name: "document-embeddings"
  dimensions: 1024
  similarity: "cosine"                # cosine | dot_product | l2

# ------------------------------------------------------------
# AWS Lambda — Action Group Functions
# ------------------------------------------------------------
lambda:
  runtime: "python3.12"
  timeout_seconds: 300
  memory_mb: 512
  functions:
    data_query:       "${LAMBDA_DATA_QUERY_ARN}"
    doc_processing:   "${LAMBDA_DOC_PROCESSING_ARN}"
    notification:     "${LAMBDA_NOTIFICATION_ARN}"

# ------------------------------------------------------------
# Amazon Textract
# ------------------------------------------------------------
textract:
  feature_types:
    - TABLES
    - FORMS
    - SIGNATURES
    - LAYOUT
  output_bucket: "${TEXTRACT_OUTPUT_BUCKET}"
  async_role_arn: "${TEXTRACT_ROLE_ARN}"
  sns_topic_arn:  "${TEXTRACT_SNS_TOPIC_ARN}"

# ------------------------------------------------------------
# Amazon Comprehend
# ------------------------------------------------------------
comprehend:
  language_code: "en"
  custom_classifier_arn: "${COMPREHEND_CLASSIFIER_ARN}"
  custom_entity_recognizer_arn: "${COMPREHEND_ENTITY_ARN}"
  endpoint_arn: "${COMPREHEND_ENDPOINT_ARN}"

# ------------------------------------------------------------
# AWS Step Functions
# ------------------------------------------------------------
step_functions:
  state_machine_arn: "${STEP_FUNCTIONS_ARN}"
  execution_role_arn: "${STEP_FUNCTIONS_ROLE_ARN}"

# ------------------------------------------------------------
# Storage
# ------------------------------------------------------------
s3:
  raw_data_bucket:       "${S3_RAW_DATA_BUCKET}"
  processed_data_bucket: "${S3_PROCESSED_DATA_BUCKET}"
  model_artifacts_bucket: "${S3_MODEL_ARTIFACTS_BUCKET}"
  output_bucket:         "${S3_OUTPUT_BUCKET}"

# ------------------------------------------------------------
# Observability
# ------------------------------------------------------------
observability:
  cloudwatch:
    log_group: "/aws/ai-platform/application"
    log_retention_days: 30
    metrics_namespace: "AWSAIPlatform"
    dashboard_name: "AWS-AI-Platform-Dashboard"

  xray:
    enabled: true
    sampling_rate: 0.05

  bedrock_model_invocation_logging:
    enabled: true
    s3_bucket: "${BEDROCK_LOGGING_BUCKET}"
    cloudwatch_log_group: "/aws/bedrock/model-invocations"

# ------------------------------------------------------------
# Secrets (reference only — never store values here)
# ------------------------------------------------------------
secrets:
  bedrock_api_key:    "arn:aws:secretsmanager:ap-southeast-2:${AWS_ACCOUNT_ID}:secret:aws-ai-platform/bedrock-api-key"
  opensearch_master:  "arn:aws:secretsmanager:ap-southeast-2:${AWS_ACCOUNT_ID}:secret:aws-ai-platform/opensearch-master"
